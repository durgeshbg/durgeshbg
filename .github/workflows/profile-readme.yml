# Self-hosted profile README cards.
#
# Setup (once):
#   1. Create a classic PAT with scopes: repo, read:user
#   2. Add repository secret: PROFILE_README_TOKEN
#   3. Actions → "Update profile README" → Run workflow
#
# Without PROFILE_README_TOKEN, GITHUB_TOKEN is used (public data only;
# private contributions will be undercounted).

name: Update profile README

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/profile-readme.yml"

permissions:
  contents: write

jobs:
  cards:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@d82657a0e215a28ec48bfc9b3987999a279f93be
        with:
          card: stats
          options: username=durgeshbg&theme=github_dark&show_icons=true&hide_border=true&include_all_commits=true&count_private=true&title_color=7ee787&icon_color=7ee787&text_color=c9d1d9&bg_color=0d1117
          path: assets/stats.svg
          token: ${{ secrets.PROFILE_README_TOKEN || github.token }}
          fail_on_error: "true"

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@d82657a0e215a28ec48bfc9b3987999a279f93be
        with:
          card: top-langs
          options: username=durgeshbg&theme=github_dark&layout=compact&hide_border=true&langs_count=8&title_color=7ee787&text_color=c9d1d9&bg_color=0d1117
          path: assets/languages.svg
          token: ${{ secrets.PROFILE_README_TOKEN || github.token }}
          fail_on_error: "true"

      - name: Generate streak card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=durgeshbg&theme=github-dark&hide_border=true&card_width=495&disable_animations=true&ring=7ee787&fire=7ee787&currStreakLabel=7ee787
          path: assets/streak.svg
          token: ${{ secrets.PROFILE_README_TOKEN || github.token }}

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/snake.svg
            assets/snake-dark.svg?palette=github-dark

      - name: Commit refreshed assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg assets/languages.svg assets/streak.svg assets/snake.svg assets/snake-dark.svg
          if git diff --cached --quiet; then
            echo "No asset changes — already up to date."
            exit 0
          fi
          git commit -m "chore: refresh profile stats [skip ci]"
          git push
